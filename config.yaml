# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "tbsy-so"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "InSAR & Time-series Deformation":
        filters: 
          - InSAR
          - "Time-series InSAR"
          - "MT-InSAR"
          - "Persistent Scatterer"
          - "Distributed Scatterer"
          - "DS-InSAR"
          - "phase unwrapping"
          - "ground deformation"

    "Mining Subsidence & Geohazard":
        filters: 
          - "mining subsidence"
          - "coal mining deformation"
          - "mining-induced subsidence"
          - "surface subsidence"
          - "geohazard monitoring"
          - "land subsidence"

    "LiDAR & UAV Remote Sensing":
        filters: 
          - LiDAR
          - "UAV-LiDAR"
          - "Airborne Laser Scanning"
          - "UAV Photogrammetry"
          - "low-altitude remote sensing"
          - "point cloud registration"
          - "point cloud co-registration"

    "Multi-source Data Fusion":
        filters: 
          - "multi-source data fusion"
          - "multi-sensor fusion"
          - "spatiotemporal fusion"
          - "data assimilation"
          - "sensor integration"
          - "multimodal fusion remote sensing"

    "Point Cloud & 3D Processing":
        filters: 
          - ICP
          - M3C2
          - "Iterative Closest Point"
          - "point cloud alignment"
          - "3D change detection"
          - "deformation extraction"

    "AI & PINNs in Remote Sensing":
        filters: 
          - PINNs
          - "physics-informed neural networks"
          - "deep learning remote sensing"
          - "spatiotemporal modeling"
          - "time-series forecasting remote sensing"
          - "physics-informed"
