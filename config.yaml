# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "tbsy-so"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "InSAR & Time-series Deformation":
        filters:
          - InSAR
          - SAR
          - "time series InSAR"
          - "MT-InSAR"
          - "SBAS-InSAR"
          - "PS-InSAR"
          - "phase unwrapping"
          - "ground deformation"
          - "surface deformation"

    "Mining Subsidence & Geohazard":
        filters:
          - "mining subsidence"
          - "land subsidence"
          - "surface subsidence"
          - "mining deformation"
          - "coal mining"
          - "geohazard"
          - "ground subsidence"

    "LiDAR & UAV Remote Sensing":
        filters:
          - LiDAR
          - "UAV LiDAR"
          - "drone LiDAR"
          - "airborne LiDAR"
          - "UAV remote sensing"
          - "low altitude remote sensing"
          - photogrammetry

    "Multi-source Data Fusion":
        filters:
          - "data fusion"
          - "multi-source fusion"
          - "multi-sensor fusion"
          - "spatiotemporal fusion"
          - "remote sensing fusion"
          - "data assimilation"

    "Point Cloud Processing":
        filters:
          - "point cloud"
          - registration
          - ICP
          - "Iterative Closest Point"
          - "3D change detection"
          - "deformation extraction"
          - M3C2

    "AI in Remote Sensing":
        filters:
          - "deep learning" 
          - "remote sensing"
          - PINNs
          - "physics-informed"
          - "spatiotemporal modeling"
          - "time series forecasting"
          - "machine learning" 
